<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Lume CSS Selector</title>
  <link rel="stylesheet" href="panel.css">
</head>
<body>

  <!-- Estado vazio -->
  <div id="state-empty" class="state-message">
    <div class="empty-icon">&#8593;</div>
    <p>Select an element in the <strong>Elements</strong> panel.</p>
  </div>

  <!-- Hierarquia de elementos (área scrollável) -->
  <div id="hierarchy-container" class="hidden">
    <div id="hierarchy"></div>
  </div>

  <!-- Barra inferior fixa: toolbar + statusbar -->
  <div id="bottom-bar" class="hidden">
    <div id="toolbar">

      <!-- Navegação -->
      <div class="tool-group">
        <button id="btn-prev" class="btn-nav" title="Previous" disabled>&#171;</button>
        <span id="counter" class="counter">- / -</span>
        <button id="btn-next" class="btn-nav" title="Next" disabled>&#187;</button>
      </div>

      <!-- Botões de ação -->
      <div class="tool-group tool-actions">
        <!-- Refresh -->
        <button id="btn-refresh" class="btn-icon" title="Refresh element">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor">
            <path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/>
          </svg>
        </button>
        <!-- Only Visible toggle -->
        <button id="btn-visibility" class="btn-icon" title="Toggle Only Visible" data-active="false">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
          </svg>
        </button>
        <!-- Copy selector -->
        <button id="btn-copy" class="btn-icon" title="Copy selector to clipboard">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor">
            <path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/>
          </svg>
        </button>
      </div>

    </div>

    <!-- Status bar -->
    <div id="statusbar">
      <span id="status-text">Click attributes to build query</span>
    </div>
  </div>

  <script src="panel.js"></script>
</body>
</html>
